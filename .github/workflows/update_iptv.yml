name: "IPTV 源智能更新与整理"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（main分支）
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 缓存 IPTV 数据库
        uses: actions/cache@v4
        with:
          path: iptv_cache.db
          key: ${{ runner.os }}-iptv-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      - name: 安装 ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行 IPTV 更新脚本
        id: collect
        continue-on-error: true
        run: python -m src.run
        env:
          MAX_WORKERS: 20
          TIMEOUT: 10
          FFMPEG_ENABLE: true
          ENABLE_RETRY: true
          ENABLE_DEMO_FILTER: true
          ENABLE_ALIAS: true
          ENABLE_BLACKLIST: true
          DATABASE_ENABLE: true
          CACHE_HOURS: 24
          MAX_SOURCES_PER_CHANNEL: 3
          DEMO_MATCH_MODE: contains

      - name: 创建输出目录（如果不存在）
        run: mkdir -p output

      - name: 检查输出文件
        run: |
          if [ -f output/tv.m3u ]; then
            echo "✅ tv.m3u 已生成，大小: $(wc -c < output/tv.m3u) 字节"
            echo "✅ tv.txt 已生成，大小: $(wc -c < output/tv.txt) 字节"
            head -5 output/tv.m3u
          else
            echo "⚠️ tv.m3u 未生成，创建占位文件"
            echo "#EXTM3U" > output/tv.m3u
            echo "# 暂无可用源" > output/tv.txt
          fi

      - name: 提交并推送到 main 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "自动更新 IPTV 列表 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
