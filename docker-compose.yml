services:
  iptv-collector:
    build: .
    container_name: iptv-collector
    restart: unless-stopped
    ports:
      - "8080:8080"      # 映射主机端口，可修改左侧端口
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./alias.txt:/app/alias.txt:ro
      - ./blacklist.txt:/app/blacklist.txt:ro
      - ./demo.txt:/app/demo.txt:ro
    environment:
      - RUN_MODE=schedule          # once 或 schedule
      - SCHEDULE_INTERVAL=21600    # 定时间隔(秒)，6小时
      - MAX_WORKERS=10
      - TIMEOUT=10
      - FFMPEG_ENABLE=true
      - ENABLE_RETRY=true
      - ENABLE_IP_RESOLVE=true
      - ENABLE_REGION_FILTER=false
      - CACHE_SPEED_HOURS=24
      - CACHE_RAW_HOURS=24
      - MAX_SOURCES_PER_CHANNEL=5
      - DEMO_MATCH_MODE=contains
      - ENABLE_DEMO_FILTER=true
      - ENABLE_ALIAS=true
      - ENABLE_BLACKLIST=true
      - DATABASE_ENABLE=true
      # CDN加速配置
      - CDN_PROXY_ENABLE=true
      - CDN_PROXY_URL=https://gh-proxy.19860519.xyz/
      - CDN_PROXY_DOMAINS=raw.githubusercontent.com,github.com
    env_file:
      - .env            # 可选，用于覆盖以上变量
