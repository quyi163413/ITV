name: Build and Release GUI

on:
  push:
    tags:
      - 'v*'  # 当推送如 v1.0.0 这样的标签时触发

jobs:
  build:
    runs-on: windows-latest  # 必须在 Windows 上打包 exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # 使用 PyInstaller 打包，--onefile 表示打包成单个 exe 文件
        pyinstaller --onefile --windowed --name "IPTV-Manager" gui/__main__.py

    - name: Upload exe to Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: dist/IPTV-Manager.exe
        asset_name: IPTV-Manager-windows-x64.exe
        tag: ${{ github.ref }}
        overwrite: true
